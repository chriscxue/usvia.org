<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Virginia International Academy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400&family=Noto+Sans+SC:wght@200&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; }

        body {
            font-family: 'Courier Prime', 'Noto Sans SC', sans-serif;
        }

        /* 全屏照片背景 */
        .hero-photo {
            width: 100%;
            height: 100%;
            position: relative;
            overflow: hidden;
        }

        .photo-layer {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center top;
            transition: opacity 0.6s ease;
        }

        .photo-bottom {
            background-image: url('/assets/graduation.webp');
        }

        .photo-top {
            background-image: url('/assets/students.webp');
        }

        .hero-photo:hover .photo-top {
            opacity: 0;
        }

        /* 居中卡片 */
        .hero-card {
            position: absolute;
            top: 80%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 480px;
            background: rgba(255, 255, 255, 0.5);
            border: 0.5px solid #000;
        }

        /* Logo 行 */
        .card-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 14px;
            border-bottom: 0.5px solid #000;
            transition: background-color 0.25s ease;
        }

        .card-logo:hover {
            background-color: #52B9DA;
        }

        .card-logo img {
            width: 140px;
            height: 140px;
            object-fit: contain;
            display: block;
        }

        /* 校名行（一格） */
        .card-name {
            padding: 20px 24px;
            font-size: 16px;
            font-weight: 200;
            line-height: 1.9;
            letter-spacing: 0.08em;
            text-align: center;
            color: #000;
            border-bottom: 0.5px solid #000;
            transition: background-color 0.25s ease;
        }

        .card-name:hover {
            background-color: #52B9DA;
            color: #fff;
        }

        /* 入口行（两格） */
        .card-entries {
            display: grid;
            grid-template-columns: 1fr 1fr;
        }

        .entry-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 18px;
            text-decoration: none;
            color: #000;
            font-family: 'Courier Prime', 'Noto Sans SC', sans-serif;
            font-size: 16px;
            font-weight: 200;
            letter-spacing: 0.08em;
            transition: background-color 0.25s ease, color 0.25s ease;
        }

        .entry-btn + .entry-btn {
            border-left: 0.5px solid #000;
        }

        .entry-btn:hover {
            background-color: #52B9DA;
            color: #fff;
        }

        /* 移动端 */
        @media (max-width: 768px) {
            .hero-card {
                width: calc(100% - 48px);
                max-width: 400px;
                top: 50%;
            }
            .card-logo img {
                width: 100px;
                height: 100px;
            }
        }
    </style>
</head>
<body>

    <div class="hero-photo">
        <div class="photo-layer photo-bottom"></div>
        <div class="photo-layer photo-top"></div>

        <div class="hero-card">
            <div class="card-logo">
                <img src="/assets/logo-color.svg" alt="Virginia International Academy">
            </div>
            <div class="card-name">VIRGINIA INTERNATIONAL ACADEMY</div>
            <div class="card-entries">
                <a href="/en/home.html" class="entry-btn">ENGLISH</a>
                <a href="/cn/home.html" class="entry-btn">中文</a>
            </div>
        </div>
    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VIA Footer 3col</title>
  <link rel="stylesheet" href="/assets/css/fonts.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Courier Prime', 'Noto Sans SC', sans-serif;
    }

    footer {
      background-color: #52B9DA;
      padding: 48px 40px 32px;
    }

    .footer-grid {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 40px;
      align-items: center;
      max-width: 1200px;
      margin: 0 auto 32px;
    }

    /* ── 左列：导航 ── */
    .footer-nav {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .footer-nav a {
      color: #fff;
      text-decoration: none;
      font-size: 16px;
      font-weight: 200;
      line-height: 1.4;
      transition: opacity 0.2s ease;
    }

    .footer-nav a:hover {
      opacity: 0.7;
    }

    /* ── 中列：Logo + 版权 ── */
    .footer-center {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      text-align: center;
    }

    .footer-logo img {
      width: 120px;
      height: auto;
      display: block;
    }

    .footer-copyright {
      color: #fff;
      font-size: 13px;
      font-weight: 200;
      line-height: 1.5;
      opacity: 0.9;
      white-space: nowrap;
    }

    /* ── 右列：联系方式 ── */
    .footer-contact {
      display: flex;
      flex-direction: column;
      gap: 10px;
      text-align: right;
    }

    .footer-contact p {
      color: #fff;
      font-size: 16px;
      font-weight: 200;
      line-height: 1.4;
    }

    .footer-contact a {
      color: #fff;
      text-decoration: none;
    }

    .footer-contact a:hover {
      opacity: 0.7;
    }

    /* ── 分隔线 ── */
    .footer-divider {
      border: none;
      border-top: 0.5px solid rgba(255, 255, 255, 0.4);
      max-width: 1200px;
      margin: 0 auto;
    }

    /* ── Mobile ── */
    @media (max-width: 768px) {
      footer {
        padding: 40px 20px 28px;
      }

      .footer-grid {
        grid-template-columns: 1fr;
        gap: 32px;
        text-align: center;
      }

      .footer-nav {
        align-items: center;
      }

      .footer-contact {
        text-align: center;
      }
    }
  </style>
</head>
<body>

<footer>
  <div class="footer-grid">

    <!-- 左：导航 -->
    <div class="footer-nav">
      <a href="/index.html">首页</a>
      <a href="/cn/educational-programs.html">教育项目</a>
      <a href="/cn/admission.html">入学申请</a>
      <a href="/cn/student-life.html">校园生活</a>
      <a href="/cn/news.html">校园动态</a>
      <a href="/cn/about-us.html">关于我们</a>
    </div>

    <!-- 中：Logo + 版权 -->
    <div class="footer-center">
      <div class="footer-logo">
        <img src="/assets/logo-color.svg" alt="Virginia International Academy">
      </div>
      <div class="footer-copyright">
        <p>©2026–2027 VIRGINIA INTERNATIONAL ACADEMY</p>
        <p>ALL RIGHTS RESERVED</p>
      </div>
    </div>

    <!-- 右：联系方式 -->
    <div class="footer-contact">
      <p>257 Toll House Road<br>Maurertown VA 22644 USA</p>
      <p>+1&nbsp;(703) 818-9178</p>
      <p>
        <a href="mailto:helen.wu@usvia.org">helen.wu@usvia.org</a><br>
        <a href="mailto:helenwuva@gmail.com">helenwuva@gmail.com</a>
      </p>
      <p>Wechat: helenwuva</p>
    </div>

  </div>

  <hr class="footer-divider">
</footer>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Header</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400&family=Noto+Sans+SC:wght@200&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier Prime', 'Noto Sans SC';
            line-height: 1.6;
            color: #000;
            background-color: #fff;
        }

        /* Header */
        .header {
            width: 100%;
            border-bottom: 0.5px solid #000;
        }

        .header-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
        }

        /* 左侧 - Logo */
        .header-left {
            display: flex;
            align-items: center;
            padding: 40px;
            border-right: 0.5px solid #000;
            background: #52B9DA;
        }

        .logo {
            display: block;
            width: 200px;
            height: 200px;
            text-decoration: none;
        }

        .logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* 右侧 - 导航菜单 */
        .header-right {
            display: flex;
            flex-direction: column;
        }

        .nav-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 40px;
            border-bottom: 0.5px solid #000;
            text-decoration: none;
            color: #000;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .nav-item:last-child {
            border-bottom: none;
            flex: 1;
        }

        .nav-item:hover {
            background-color: #52B9DA;
            color: #fff;
        }

        .nav-label {
            font-size: 16px;
            font-weight: 200;
        }

        .nav-toggle-hint {
            display: none;
        }


        .nav-arrow svg {
            width: 16px;
            height: 16px;
            transition: transform 0.3s ease;
        }

        .nav-item:hover .nav-arrow svg {
            transform: translateX(4px);
        }

        .nav-item.active {
            background-color: #52B9DA;
            color: #fff;
        }

        .nav-item.active .nav-arrow svg {
            transform: rotate(90deg);
        }

        .nav-item.active:hover .nav-arrow svg {
            transform: rotate(90deg);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header-grid {
                grid-template-columns: 1fr;
            }

            .header-left {
                border-right: none;
                border-bottom: 0.5px solid #000;
                padding: 24px 20px;
                justify-content: center;
                flex-direction: column;
                gap: 10px;
                cursor: pointer;
            }

            .logo {
                width: 100px;
                height: 100px;
            }

            .nav-toggle-hint {
                display: block;
                font-family: 'Courier Prime', monospace;
                font-size: 18px;
                font-weight: 400;
                color: #000;
                line-height: 1;
                margin-top: 4px;
            }

            .header-right {
                display: none;
                border-bottom: 0.5px solid #000;
            }

            .header-right.open {
                display: flex;
            }

            .nav-item {
                padding: 16px 20px;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-grid">
            <div class="header-left" id="nav-toggle">
                <a href="#" class="logo">
                    <img src="/assets/logo-color.svg" alt="Virginia International Academy">
                </a>
                <span class="nav-toggle-hint">+</span>
            </div>
            <nav class="header-right">
                <a href="/cn/home.html" class="nav-item">
                    <span class="nav-label">首页</span>
                    <span class="nav-arrow"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M9 18L15 12L9 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
                </a>
                <a href="/cn/educational-programs.html" class="nav-item">
                    <span class="nav-label">教育项目</span>
                    <span class="nav-arrow"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M9 18L15 12L9 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
                </a>
                <a href="/cn/student-life.html" class="nav-item">
                    <span class="nav-label">校园生活</span>
                    <span class="nav-arrow"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M9 18L15 12L9 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
                </a>
                <a href="/cn/news.html" class="nav-item">
                    <span class="nav-label">校园动态</span>
                    <span class="nav-arrow"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M9 18L15 12L9 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
                </a>
                <a href="/cn/admission.html" class="nav-item">
                    <span class="nav-label">入学申请</span>
                    <span class="nav-arrow"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M9 18L15 12L9 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
                </a>
                <a href="/cn/about-us.html" class="nav-item">
                    <span class="nav-label">关于我们</span>
                    <span class="nav-arrow"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M9 18L15 12L9 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
                </a>
            </nav>
        </div>
    </header>
    <script>
        (function() {
            // 移动端导航 toggle
            var toggle = document.getElementById('nav-toggle');
            var nav = document.querySelector('.header-right');
            var hint = document.querySelector('.nav-toggle-hint');
            if (toggle && nav) {
                toggle.addEventListener('click', function(e) {
                    e.preventDefault();
                    nav.classList.toggle('open');
                    if (hint) hint.textContent = nav.classList.contains('open') ? '×' : '+';
                });
            }

            // 标记当前页面为 active
            var path = window.location.pathname;
            // 首页兼容 /index.html 和 /
            if (path === '/' || path === '/index.html') path = '/index.html';
            var items = document.querySelectorAll('.nav-item');
            items.forEach(function(item) {
                var href = item.getAttribute('href');
                if (href && href === path) {
                    item.classList.add('active');
                }
            });
        })();
    </script>
</body>
</html>

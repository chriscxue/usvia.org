<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Header</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400&family=Noto+Sans+SC:wght@300;400&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier Prime', 'Noto Sans SC', sans-serif;
            line-height: 1.6;
            color: #000;
            background-color: #fff;
        }

        /* Header */
        .header {
            width: 100%;
            border-bottom: 0.5px solid #000;
        }

        .header-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
        }

        /* 左侧 - Logo */
        .header-left {
            display: flex;
            align-items: center;
            padding: 40px;
            border-right: 0.5px solid #000;
            background: #52B9DA;
        }

        .logo {
            display: block;
            width: 200px;
            height: 200px;
            color: #000;
            text-decoration: none;
        }

        .logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* 右侧 - 导航菜单 */
        .header-right {
            display: flex;
            flex-direction: column;
        }

        .nav-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 40px;
            border-bottom: 0.5px solid #000;
            text-decoration: none;
            color: #000;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .nav-item:last-child {
            border-bottom: none;
            flex: 1;
        }

        .nav-item:hover {
            background-color: #52B9DA;
            color: #fff;
        }

        .nav-label {
            font-size: 16px;
            font-weight: 400;
        }

        .nav-arrow svg {
            width: 12px;
            height: 12px;
            transition: transform 0.3s ease;
        }

        .nav-item:hover .nav-arrow svg {
            transform: translateX(4px);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header-grid {
                grid-template-columns: 1fr;
            }

            .header-left {
                border-right: none;
                border-bottom: 0.5px solid #000;
                padding: 24px 20px;
            }

            .nav-item {
                padding: 16px 20px;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-grid">
            <div class="header-left">
                <a href="#" class="logo">
                    <img src="/assets/logo-color.svg" alt="Virginia International Academy">
                </a>
            </div>
            <nav class="header-right">
                <a href="#" class="nav-item">
                    <span class="nav-label">首页</span>
                    <span class="nav-arrow"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 4V20M18 6L6 18M20 12H4M18 18L6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
                </a>
                <a href="#" class="nav-item">
                    <span class="nav-label">教育项目</span>
                    <span class="nav-arrow"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 4V20M18 6L6 18M20 12H4M18 18L6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
                </a>
                <a href="#" class="nav-item">
                    <span class="nav-label">入学申请</span>
                    <span class="nav-arrow"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 4V20M18 6L6 18M20 12H4M18 18L6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
                </a>
                <a href="#" class="nav-item">
                    <span class="nav-label">校园生活</span>
                    <span class="nav-arrow"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 4V20M18 6L6 18M20 12H4M18 18L6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
                </a>
                <a href="#" class="nav-item">
                    <span class="nav-label">关于我们</span>
                    <span class="nav-arrow"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 4V20M18 6L6 18M20 12H4M18 18L6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
                </a>
            </nav>
        </div>
    </header>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VIA Footer</title>
  <link rel="stylesheet" href="/assets/css/fonts.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Courier Prime', 'Noto Sans SC', sans-serif;
    }

    footer {
      min-height: 340px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 20px;
      text-align: center;
      background-color: #52B9DA;
    }

    /* ── Logo ── */
    .footer-logo {
      margin-bottom: 28px;
    }

    .footer-logo img {
      width: 149px;
      height: auto;
      display: block;
    }

    /* ── Contact text ── */
    .footer-text {
      color: #ffffff;
      font-size: 16px;
      font-weight: 200;
      line-height: 1.4;
      margin-bottom: 18px;
    }

    .footer-text a {
      color: #ffffff;
      text-decoration: none;
    }

    .footer-text a:hover {
      text-decoration: underline;
    }

    /* ── Copyright ── */
    .footer-copyright {
      color: #ffffff;
      font-size: 16px;
      font-weight: 200;
      line-height: 1.4;
      letter-spacing: 0.02em;
      opacity: 0.9;
    }


    /* ── Mobile ── */
    @media (max-width: 767px) {
      footer {
        padding: 24px 10px;
      }
      .footer-text {
        font-size: 14px;
      }
      .footer-copyright {
        font-size: 14px;
      }
    }
  </style>
</head>
<body>

<footer>

  <!-- Logo -->
  <div class="footer-logo">
    <img
      src="/assets/logo-color.svg"
      alt="Virginia International Academy"
    >
  </div>

  <!-- Contact info -->
  <div class="footer-text">
    <p>257 Toll House Road, Maurertown VA 22644 USA</p>
    <p>+1&nbsp;(703) 818-9178</p>
    <p>
      <a href="mailto:helen.wu@usvia.org">helen.wu@usvia.org</a><br>
      <a href="mailto:helenwuva@gmail.com">helenwuva@gmail.com</a>
    </p>
    <p>Wechat: helenwuva</p>
  </div>

  <!-- Copyright -->
  <div class="footer-copyright">
    <p>©2026–2027 VIRGINIA INTERNATIONAL ACADEMY – ALL RIGHTS RESERVED</p>
  </div>


</footer>

</body>
</html>

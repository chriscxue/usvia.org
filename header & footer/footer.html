<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VIA Footer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400&family=Noto+Sans+SC:wght@300;400&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Courier Prime', 'Noto Sans SC', sans-serif;
    }

    footer {
      position: relative;
      min-height: 540px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding: 0 20px 60px;
      text-align: center;
      overflow: hidden;
    }

    footer {
      background-color: #525252;
    }

    /* ── Logo ── */
    .footer-logo {
      margin-bottom: 28px;
    }

    .footer-logo img {
      width: 149px;
      height: auto;
      display: block;
    }

    /* ── Contact text ── */
    .footer-text {
      color: #ffffff;
      font-size: 14px;
      line-height: 2;
      margin-bottom: 18px;
    }

    .footer-text a {
      color: #ffffff;
      text-decoration: none;
    }

    .footer-text a:hover {
      text-decoration: underline;
    }

    /* ── Copyright ── */
    .footer-copyright {
      color: #ffffff;
      font-size: 12px;
      letter-spacing: 0.02em;
      margin-bottom: 22px;
      opacity: 0.9;
    }

    /* ── Social icons ── */
    .footer-social {
      display: flex;
      gap: 12px;
      justify-content: center;
    }

    .social-btn {
      width: 38px;
      height: 38px;
      border: 0.5px solid rgba(255, 255, 255, 0.85);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
      text-decoration: none;
    }

    .social-btn:hover {
      background: rgba(255, 255, 255, 0.18);
      border-color: #ffffff;
    }

    .social-btn svg {
      width: 15px;
      height: 15px;
      fill: #ffffff;
      display: block;
    }

    /* ── Mobile ── */
    @media (max-width: 767px) {
      footer {
        padding: 0 10px 100px;
      }
    }
  </style>
</head>
<body>

<footer>

  <!-- Logo -->
  <div class="footer-logo">
    <img
      src="/assets/logo-color.svg"
      alt="Virginia International Academy"
